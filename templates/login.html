{% extends 'base.html' %}
{% block title %}Login — BankFlow{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;">🏦</div>
      <div class="auth-brand">BankFlow</div>
      <p class="text-muted" style="font-size:.9rem;">Banking Transaction System</p>
    </div>
    <h5 class="fw-bold mb-3" style="color:#0f172a;">Sign in to your account</h5>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-envelope me-1"></i>Email address</label>
        <input type="email" class="form-control" name="email" required placeholder="you@example.com"/>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
        <div class="input-group">
          <input type="password" class="form-control" name="password" id="pwdInput" required placeholder="••••••••"/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()" style="border-radius:0 10px 10px 0;border-left:0;">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <div class="text-center" style="font-size:.875rem;color:#64748b;">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--primary);font-weight:600;text-decoration:none;">Create one</a>
    </div>
  </div>
</div>
<script>
function togglePwd() {
  const i = document.getElementById('pwdInput');
  const eye = document.getElementById('eyeIcon');
  i.type = i.type === 'password' ? 'text' : 'password';
  eye.className = i.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
